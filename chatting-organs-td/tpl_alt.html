<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,200;1,300;1,400&family=M+PLUS+Rounded+1c&family=Noto+Sans+TC:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            width: 100vw;
            height: 100vh;
            position: relative;
            margin: 0;
            padding: 0;
        }

        main {
            margin: 0;
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            align-items: center;
            height: 100%;
        }

        section {
            height: 50%;
            display: flex;
            align-items: start;
        }

        section:first-child {
            align-items: end;
        }

        .m-plus-rounded-1c-regular {
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .box {
            font-family: "M PLUS Rounded 1c", sans-serif;
            font-weight: 400;
            font-style: normal;
            font-size: 5vh;
            align-items: center;
            justify-content: center;
            margin: 1rem 1rem;
            padding: 0.5rem;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <main>
        <section>
            <div class="box" id="en">$EN_TEXT</div>
        </section>
        <section>
            <div class="box" id="ja">$TEXT</div>
        </section>
    </main>
    <script>
        const hosturl = new URL(window.location.href);
        const wsUri = `ws://${window.location.host}?speaker=${hosturl.searchParams.get("speaker")}`;
        websocket = new WebSocket(wsUri);

        websocket.onopen = (ev) => {}

        websocket.onmessage = (ev) => {
            const msg = JSON.parse(ev.data);
            const { line, line_en } = msg;

            if (line) {
                const ja_txt = document.getElementById('ja');
                ja_txt.textContent = line;
            }

            if (line_en) {
                const en_txt = document.getElementById('en')
                en_txt.textContent = line_en;
            }
        };

        websocket.onerror = (ev) => {};
        websocket.onclose = (ev) => {};
    </script>
</body>

</html>
